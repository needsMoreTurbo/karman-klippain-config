# TMC Autotune — LDO Voron 2.4 350mm
# https://github.com/andrewmcgr/klipper_tmc_autotune
#
# Motor database: https://github.com/andrewmcgr/klipper_tmc_autotune/blob/main/motor_database.cfg
# All motors run at 24V (single PSU — no HV 48V rail)
#
# NOTE: The README recommends interpolate: true in [tmc*] sections for best autotune results.
# Currently using interpolate: false — consider enabling if print quality issues arise.

#####################################################################
#   X/Y (AB) — TMC5160 — LDO-42STH48-2004MAH (0.9°, 2.0A, 400 steps/rev)
#####################################################################

[autotune_tmc stepper_x]
motor: ldo-42sth48-2004mah
voltage: 24
tuning_goal: performance

[autotune_tmc stepper_y]
motor: ldo-42sth48-2004mah
voltage: 24
tuning_goal: performance

#####################################################################
#   Z — TMC2209 — LDO-42STH48-2004AC (1.8°, 2.0A, 200 steps/rev)
#####################################################################

[autotune_tmc stepper_z]
motor: ldo-42sth48-2004ac
voltage: 24
tuning_goal: silent

[autotune_tmc stepper_z1]
motor: ldo-42sth48-2004ac
voltage: 24
tuning_goal: silent

[autotune_tmc stepper_z2]
motor: ldo-42sth48-2004ac
voltage: 24
tuning_goal: silent

[autotune_tmc stepper_z3]
motor: ldo-42sth48-2004ac
voltage: 24
tuning_goal: silent

#####################################################################
#   Extruder — TMC2209 — LDO-36STH20-1004AHG (1.8°, 1.0A, 200 steps/rev)
#####################################################################

[autotune_tmc extruder]
motor: ldo-36sth20-1004ahg
voltage: 24
tuning_goal: auto
