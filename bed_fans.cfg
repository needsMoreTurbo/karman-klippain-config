# ---------------------------------------------------------------------------
# Bed Fan Control System (state-machine rewrite)
# Design of record: docs/bed_fans_control.md
# ---------------------------------------------------------------------------
# One always-on delayed_gcode (_BED_FAN_TICK) governs both standby preheat and
# printing. Fan behaviour is gated on the BED (not the chamber); the chamber is
# only a safety cap. States: OFF -> HEATING -> RAMP -> HOLD, plus MANUAL and COOL.
#
#   HEATING  : bed climbing to target        -> gentle heating_speed (won't stall heater)
#   RAMP     : bed at target, settled         -> step up toward high_speed
#   HOLD     : ramp complete                  -> hold high_speed (chamber-capped)
#   MANUAL   : you set a speed / moved slider -> held until BED_FANS_AUTO or print end
#   COOL     : post-print                     -> low until chamber cools, then off
#
# MANUAL CONTROL:
#   BED_FANS_MANUAL SPEED=<0-100>  - latch a fixed speed for the rest of the print
#   BED_FANS_AUTO                  - clear the latch, resume automatic control
#   BED_FANS_OFF                   - hard off (latched)
#   BED_FANS_STATUS                - report state / speed / latch / thresholds
#   Moving the Mainsail fan slider also auto-latches to that speed.

# ---------------------------------------------------------------------------
# HARDWARE
# ---------------------------------------------------------------------------
## These settings work well for LDO 5015 fans, but do not work with lower quality fans (GDSTIME, etc.)
[fan_generic Bed_Fans]
pin: PF9
max_power: 1.0
shutdown_speed: 0
kick_start_time: 0.5
off_below: 0.09
# hardware_pwm: False
# cycle_time: 0.005

## NOTE: the old [output_pin DISABLE_BED_FANS] (PG9) pause toggle has been removed -
## its function is replaced by BED_FANS_OFF / BED_FANS_AUTO. If PG9 was wired to real
## hardware that needs a defined output state, re-add the output_pin section.

# ---------------------------------------------------------------------------
# CONFIGURATION VARIABLES  (see docs/bed_fans_control.md for the tuning guide)
# ---------------------------------------------------------------------------
[gcode_macro _BED_FAN_VARS]
variable_enable: True             # master enable
variable_activation_temp: 90      # only engage when heater_bed.target >= this (skips PLA/PET)
variable_heating_speed: 0.10      # gentle speed while the bed climbs (preheat + in-print); 0 = fully off while heating
variable_high_speed: 0.55         # ramp ceiling
variable_target_tolerance: 2.0    # deg C band counted as "at target"
variable_settle_time: 30          # seconds at target before the ramp starts
variable_ramp_step: 0.03          # speed increment/decrement per tick
variable_ramp_drop_guard: 3.0     # deg C below target that forces a step-down + ramp freeze
variable_reheat_band: 8.0         # deg C below target before we abandon the ramp and fully re-heat (must be > ramp_drop_guard)
variable_chamber_max: 55          # chamber cap - fans step down above this
variable_chamber_resume: 50       # fans may step back up below this (hysteresis)
variable_cool: True               # run fans low post-print to assist bed cool-down
variable_cool_temp: 40            # stop the post-print cool assist below this chamber temp
variable_tick_interval: 4         # seconds between ticks while active
## internal state - do not edit
variable_commanded: 0.0           # last speed the loop commanded (for slider-change detection)
variable_settle_ticks: 0          # consecutive ticks the bed has been at target
variable_manual_latch: False      # True while a manual override is held
variable_manual_speed: 0.0        # the latched manual speed
variable_state: "OFF"             # current state name (for BED_FANS_STATUS)
gcode:

# ---------------------------------------------------------------------------
# MANUAL CONTROL MACROS
# ---------------------------------------------------------------------------
[gcode_macro BED_FANS_MANUAL]
description: Latch bed fans to a fixed speed (SPEED=0-100) until BED_FANS_AUTO or print end
gcode:
    {% set pct = params.SPEED|default(30)|float %}
    {% set spd = ([[pct, 100]|min, 0]|max) / 100.0 %}
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=manual_latch VALUE=True
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=manual_speed VALUE={spd|round(3)}
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=commanded VALUE={spd|round(3)}
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=state VALUE="'MANUAL'"
    SET_FAN_SPEED FAN=Bed_Fans SPEED={spd|round(3)}
    RESPOND TYPE=COMMAND MSG="Bed Fans: manual override at {pct|round|int}% (BED_FANS_AUTO to resume auto)"

[gcode_macro BED_FANS_AUTO]
description: Clear the manual override and resume automatic bed fan control
gcode:
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=manual_latch VALUE=False
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=settle_ticks VALUE=0
    RESPOND TYPE=COMMAND MSG="Bed Fans: automatic control resumed"
    UPDATE_DELAYED_GCODE ID=_BED_FAN_TICK DURATION=1

[gcode_macro BED_FANS_OFF]
description: Force the bed fans off and hold them off (latched)
gcode:
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=manual_latch VALUE=True
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=manual_speed VALUE=0.0
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=commanded VALUE=0.0
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=state VALUE="'MANUAL-OFF'"
    SET_FAN_SPEED FAN=Bed_Fans SPEED=0
    RESPOND TYPE=COMMAND MSG="Bed Fans: manually OFF (BED_FANS_AUTO to resume auto)"

[gcode_macro BED_FANS_STATUS]
description: Report bed fan state, speed, latch and thresholds
gcode:
    {% set bv = printer["gcode_macro _BED_FAN_VARS"] %}
    {% set fan = printer["fan_generic Bed_Fans"] %}
    RESPOND TYPE=COMMAND MSG="Bed Fans: state={bv.state} speed={(fan.speed * 100)|round|int}% latch={bv.manual_latch} enable={bv.enable}"
    RESPOND TYPE=COMMAND MSG="Bed Fans: heat={(bv.heating_speed * 100)|round|int}% high={(bv.high_speed * 100)|round|int}% activate>={bv.activation_temp}c cap={bv.chamber_max}c resume<{bv.chamber_resume}c cool<{bv.cool_temp}c"

# ---------------------------------------------------------------------------
# CONTROL LOOP
# ---------------------------------------------------------------------------
[delayed_gcode _BED_FAN_TICK]
initial_duration: 3
gcode:
    {% set bv = printer["gcode_macro _BED_FAN_VARS"] %}
    {% set fan = printer["fan_generic Bed_Fans"] %}
    {% set eps = 0.02 %}
    {% set actual = fan.speed|float %}
    {% set cur = bv.commanded|float %}
    {% set ps = printer.print_stats.state %}
    {% set bed_t = printer.heater_bed.temperature|float %}
    {% set bed_target = printer.heater_bed.target|float %}
    {% set chamber = printer["temperature_sensor Chamber"].temperature|float %}
    {% set heat = bv.heating_speed|float %}
    {% set high = bv.high_speed|float %}
    {% set settle_needed = (bv.settle_time / bv.tick_interval)|round(0, 'ceil')|int %}
    {% set ended = ps in ['complete', 'cancelled', 'error'] %}
    {% set slider_changed = (not bv.manual_latch) and ((actual - cur)|abs > eps) %}

    # ---- defaults ----
    {% set is_manual = False %}
    {% set desired = 0.0 %}
    {% set new_commanded = 0.0 %}
    {% set new_settle = 0 %}
    {% set new_latch = bv.manual_latch %}
    {% set new_manual = bv.manual_speed|float %}
    {% set newstate = 'OFF' %}
    {% set nextdur = bv.tick_interval|int %}
    {% set msg = '' %}

    {% if not bv.enable %}
        {% set desired = 0.0 %}
        {% set new_commanded = 0.0 %}
        {% set new_latch = False %}
        {% set new_manual = 0.0 %}
        {% set newstate = 'DISABLED' %}
        {% set nextdur = 30 %}
    {% elif ended %}
        # ---- COOL / off after a print; always release the manual latch ----
        {% set new_latch = False %}
        {% set new_manual = 0.0 %}
        {% set new_settle = 0 %}
        {% if bv.cool and chamber >= bv.cool_temp|float %}
            {% set desired = heat %}
            {% set new_commanded = heat %}
            {% set newstate = 'COOL' %}
        {% else %}
            {% set desired = 0.0 %}
            {% set new_commanded = 0.0 %}
            {% set newstate = 'OFF' %}
            {% set nextdur = 30 %}
        {% endif %}
    {% elif bv.manual_latch %}
        # ---- held manual override (macro or slider); keep tracking the slider ----
        {% set is_manual = True %}
        {% set redrag = (actual - bv.manual_speed|float)|abs > eps %}
        {% set new_manual = actual if redrag else bv.manual_speed|float %}
        {% set new_commanded = new_manual %}
        {% set new_latch = True %}
        {% set newstate = 'MANUAL' %}
    {% elif slider_changed %}
        # ---- external slider move -> auto-latch to that speed ----
        {% set is_manual = True %}
        {% set new_manual = actual %}
        {% set new_commanded = actual %}
        {% set new_latch = True %}
        {% set newstate = 'MANUAL' %}
        {% set msg = 'Bed Fans: slider moved - manual override latched at ' ~ (actual * 100)|round|int ~ '% (BED_FANS_AUTO to resume auto)' %}
    {% else %}
        # ---- automatic control ----
        {% set new_latch = False %}
        {% set new_manual = 0.0 %}
        # "reached" latches once the bed has settled at target; it stays latched
        # while the bed is within reheat_band, so the drop-guard can modulate the
        # fan instead of the machine slamming back to HEATING on a small dip.
        {% set reached = bv.settle_ticks|int >= settle_needed %}
        {% if bed_target < bv.activation_temp|float %}
            {% set desired = 0.0 %}
            {% set new_commanded = 0.0 %}
            {% set new_settle = 0 %}
            {% set newstate = 'OFF' %}
            {% set nextdur = 10 %}
        {% elif (not reached and bed_t < (bed_target - bv.target_tolerance|float)) or (reached and bed_t < (bed_target - bv.reheat_band|float)) %}
            # bed still climbing (initial heat-up) or a large drop = genuine re-heat
            # -> gentle, never high (heater-stall protection); restart the ramp
            {% set desired = heat %}
            {% set new_commanded = heat %}
            {% set new_settle = 0 %}
            {% set newstate = 'HEATING' %}
        {% else %}
            # at target (settling) OR already ramping/holding within reheat_band
            {% if reached %}
                {% set new_settle = settle_needed %}
            {% else %}
                {% set new_settle = [bv.settle_ticks|int + 1, settle_needed]|min %}
            {% endif %}
            {% if new_settle < settle_needed %}
                # holding gentle while the bed settles at target
                {% set desired = heat %}
                {% set new_commanded = heat %}
                {% set newstate = 'SETTLE' %}
            {% else %}
                {% if bed_t < (bed_target - bv.ramp_drop_guard|float) %}
                    # drop-guard: bed dipped within the band -> back off + freeze ramp
                    {% set desired = [heat, cur - bv.ramp_step|float]|max %}
                    {% set newstate = 'DROP-GUARD' %}
                {% elif chamber >= bv.chamber_max|float %}
                    # chamber cap: too hot -> step down
                    {% set desired = [heat, cur - bv.ramp_step|float]|max %}
                    {% set newstate = 'CHAMBER-CAP' %}
                {% elif chamber >= bv.chamber_resume|float %}
                    # hysteresis band: neither raise nor lower
                    {% set desired = cur %}
                    {% set newstate = 'HOLD' if cur >= high else 'RAMP-HOLD' %}
                {% else %}
                    # clear to ramp up toward high_speed
                    {% if cur < high %}
                        {% set desired = [high, cur + bv.ramp_step|float]|min %}
                        {% set newstate = 'RAMP' %}
                    {% else %}
                        {% set desired = high %}
                        {% set newstate = 'HOLD' %}
                    {% endif %}
                {% endif %}
                {% set new_commanded = desired %}
            {% endif %}
        {% endif %}
    {% endif %}

    # ---- apply ----
    {% if not is_manual %}
        SET_FAN_SPEED FAN=Bed_Fans SPEED={desired|round(3)}
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=commanded VALUE={new_commanded|round(3)}
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=settle_ticks VALUE={new_settle}
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=manual_latch VALUE={new_latch}
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=manual_speed VALUE={new_manual|round(3)}
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=state VALUE="'{newstate}'"
    {% if msg != '' %}
        RESPOND TYPE=COMMAND MSG="{msg}"
    {% endif %}
    UPDATE_DELAYED_GCODE ID=_BED_FAN_TICK DURATION={nextdur}
