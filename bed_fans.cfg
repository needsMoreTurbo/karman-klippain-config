# ---------------------------------------------------------------------------
# Bed Fans Monitor - Adapted from 3DPrintDemon demon_bed_fans_monitor_v2.0.1
# https://github.com/3DPrintDemon/Demon_Klipper_Essentials_Unified
# ---------------------------------------------------------------------------
#
# ACTIVATION STEPS:
# 1. Uncomment the hardware sections below and fill in your pin numbers
#    (check your previous bed_fans.cfg backup for the pin you used)
# 2. Set variable_enable: True in _BED_FAN_VARS
# 3. Tune the thresholds for your filaments:
#    chamber_threshold  - fans switch from high→low speed at this °C (ABS: ~40°C)
#    chamber_off_temp   - fans turn off at this °C (ABS: ~55°C)
#
# MANUAL CONTROL DURING PRINT:
#   - DISABLE_BED_FANS output_pin creates a toggle button in Mainsail to pause/resume fans
#   - BED_FANS_SET_SPEED macro: adjust speeds live (LOW_SPEED_PERCENT / HIGH_SPEED_PERCENT)
#   - Slider <50% stores as new LOW speed, >=50% stores as new HIGH speed
#   - BED_FANS_SET_SPEED_INFO: shows current speed settings

# ---------------------------------------------------------------------------
# HARDWARE - uncomment and fill in pins when fans are wired:
# ---------------------------------------------------------------------------

## These settings work well for LDO 5015 fans, but do not work with lower quality fans (GDSTIME, etc.)
[fan_generic Bed_Fans]
pin: PF9
max_power: 1.0
shutdown_speed: 0
kick_start_time: 0.5
off_below: 0.09
# hardware_pwm: False
# cycle_time: 0.005

[output_pin DISABLE_BED_FANS]
pin: PG9


# ---------------------------------------------------------------------------
# CONFIGURATION VARIABLES
# ---------------------------------------------------------------------------

[gcode_macro _BED_FAN_VARS]
variable_chamber_threshold: 40        # fans switch high→low at this chamber temp (°C)
variable_chamber_off_temp: 55         # fans turn off at this chamber temp (°C)
variable_high: 0.55                   # high fan speed (0.0-1.0, 55% recommended)
variable_low: 0.22                    # low fan speed (0.0-1.0)
variable_cool: True                   # run fans at low after print to help bed cool
variable_cool_temp: 40                # stop cooling fans once chamber reaches this °C
variable_enable: True                 # set True when hardware is wired and ready
variable_floating_monitor: True       # adaptive mode: gradually adjusts speed vs chamber midpoint
variable_floating_max_speed: 0.50     # floating fan ceiling as fraction of high-low range (0.0-1.0)
## internal tracking - do not edit
variable_readback_value: 0
variable_previous_readback_value: 10
variable_previous_chamber_temp: 0
variable_mid_point_temp: 0
variable_mid_point_fan: 0
variable_current_fan_speed: 0.0
variable_previous_floating_fan: 0
variable_macro_used: False
gcode:

# ---------------------------------------------------------------------------
# INFORMATION MACROS
# ---------------------------------------------------------------------------

[gcode_macro BED_FANS_THERMAL_INFO]
description: Report chamber temperature thresholds
gcode:
    {% set bv = printer["gcode_macro _BED_FAN_VARS"] %}
    RESPOND TYPE=COMMAND MSG="Bed Fans: threshold {bv.chamber_threshold}°C (high→low), off at {bv.chamber_off_temp}°C, midpoint {('%.0fc' % bv.mid_point_temp)}"

[gcode_macro BED_FANS_SET_SPEED_INFO]
description: Report current Bed Fans low/high/floating speed settings
gcode:
    {% set bv = printer["gcode_macro _BED_FAN_VARS"] %}
    RESPOND TYPE=COMMAND MSG="Bed Fans speeds: LOW={('%.0f' % (bv.low * 100))}% FLOATING_MAX={('%.0f' % (bv.mid_point_fan * 100))}% HIGH={('%.0f' % (bv.high * 100))}%"

[gcode_macro _BED_FAN_READ]
description: Dump all Bed Fan variable state to console
gcode:
    {% set bv = printer["gcode_macro _BED_FAN_VARS"] %}
    RESPOND TYPE=COMMAND MSG="Bed Fans enable={bv.enable} threshold={bv.chamber_threshold}c off={bv.chamber_off_temp}c high={bv.high} low={bv.low}"
    RESPOND TYPE=COMMAND MSG="Bed Fans cool={bv.cool} cool_temp={bv.cool_temp}c readback={bv.readback_value} prev_readback={bv.previous_readback_value}"
    RESPOND TYPE=COMMAND MSG="Bed Fans current_speed={bv.current_fan_speed} mid_point={bv.mid_point_temp}c mid_fan={bv.mid_point_fan} floating_max={bv.floating_max_speed}"
    {% if bv.enable %}
        RESPOND TYPE=COMMAND MSG="Bed Fans actual_speed={printer['fan_generic Bed_Fans'].speed}"
    {% endif %}

# ---------------------------------------------------------------------------
# SPEED CONTROL MACROS
# ---------------------------------------------------------------------------

[gcode_macro BED_FANS_SET_SPEED]
description: Set Bed Fans high and low speeds during a print (LOW_SPEED_PERCENT / HIGH_SPEED_PERCENT)
gcode:
    {% set low_speed  = params.LOW_SPEED_PERCENT|default(25)|float %}
    {% set high_speed = params.HIGH_SPEED_PERCENT|default(65)|float %}
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=macro_used VALUE=True
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=low  VALUE={low_speed  / 100.0}
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=high VALUE={high_speed / 100.0}

[gcode_macro FLOATING_FANS_MAX_SPEED]
description: Adjust floating fan ceiling during print (SCALED_POWER 0-100, scaled between low and high)
gcode:
    {% set bv = printer["gcode_macro _BED_FAN_VARS"] %}
    {% set scaled = params.SCALED_POWER|default(65)|float %}
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=macro_used VALUE=True
    {% if bv.floating_monitor %}
        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=floating_max_speed VALUE={scaled / 100.0}
    {% else %}
        RESPOND TYPE=error MSG="Floating fans are not enabled"
    {% endif %}

# ---------------------------------------------------------------------------
# KLIPPAIN INTEGRATION HOOK
# ---------------------------------------------------------------------------

[gcode_macro _START_PRINT_ACTION_BED_FANS_MONITOR]
description: Klippain startprint_actions hook - starts the bed fan monitor loop
gcode:
    {% set bv = printer["gcode_macro _BED_FAN_VARS"] %}
    {% if bv.enable %}
        UPDATE_DELAYED_GCODE ID=_BED_FAN_MONITOR DURATION=1
        RESPOND TYPE=COMMAND MSG="Bed Fans: monitor started"
    {% endif %}

# ---------------------------------------------------------------------------
# INTERNAL LOGIC
# ---------------------------------------------------------------------------

[gcode_macro _MONITOR_MESSAGE_READ]
gcode:
    {% set bv = printer["gcode_macro _BED_FAN_VARS"] %}
    {% if   bv.readback_value == 1 %} RESPOND TYPE=COMMAND MSG="Bed Fans: bed too cold, fans off while bed heats"
    {% elif bv.readback_value == 2 %} RESPOND TYPE=COMMAND MSG="Bed Fans: below threshold, high speed {(bv.high * 100)|int}%"
    {% elif bv.readback_value == 3 %} RESPOND TYPE=COMMAND MSG="Bed Fans: above threshold, low speed {(bv.low * 100)|int}%"
    {% elif bv.readback_value == 4 %} RESPOND TYPE=COMMAND MSG="Bed Fans: chamber >{bv.chamber_off_temp}°C, fans off"
    {% elif bv.readback_value == 5 %} RESPOND TYPE=COMMAND MSG="Bed Fans: paused, fans off"
    {% elif bv.readback_value == 6 %} RESPOND TYPE=COMMAND MSG="Bed Fans: cooling post-print, fans low until <{bv.cool_temp}°C"
    {% elif bv.readback_value == 7 %} RESPOND TYPE=COMMAND MSG="Bed Fans: stopped"
    {% elif bv.readback_value == 8 %} RESPOND TYPE=COMMAND MSG="Bed Fans: override active, fans manually paused"
    {% elif bv.readback_value == 9 %} RESPOND TYPE=COMMAND MSG="Bed Fans: stopped, override cleared"
    {% endif %}

[gcode_macro _MONITOR_FAN_SET]
gcode:
    {% set bv = printer["gcode_macro _BED_FAN_VARS"] %}
    {% if bv.readback_value in [1, 4, 5, 7, 8, 9] %}
        SET_FAN_SPEED FAN=Bed_Fans SPEED=0
    {% elif bv.readback_value == 2 %}
        SET_FAN_SPEED FAN=Bed_Fans SPEED={bv.high}
    {% elif bv.readback_value in [3, 6] %}
        SET_FAN_SPEED FAN=Bed_Fans SPEED={bv.low}
    {% endif %}

[gcode_macro _BED_FAN_HELPER]
gcode:
    {% set bv = printer["gcode_macro _BED_FAN_VARS"] %}
    {% set verbose = printer["gcode_macro _USER_VARIABLES"].verbose %}
    {% if bv.readback_value == bv.previous_readback_value %}
        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=previous_readback_value VALUE={bv.readback_value}
        {% if bv.macro_used %}
            {% if verbose %} RESPOND TYPE=COMMAND MSG="Bed Fans: speed changed via macro" {% endif %}
        {% else %}
            {% set actual_speed = printer["fan_generic Bed_Fans"].speed|float %}
            {% if actual_speed != bv.current_fan_speed %}
                {% if actual_speed == 0 %}
                    RESPOND TYPE=error MSG="Bed Fans: slider set to 0 is not allowed - use DISABLE_BED_FANS toggle instead"
                {% elif actual_speed > 0.1 and actual_speed < 0.5 %}
                    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=current_fan_speed VALUE={actual_speed}
                    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=low VALUE={actual_speed}
                    RESPOND TYPE=COMMAND MSG="Bed Fans: slider <50% detected, applied as new LOW speed ({(actual_speed * 100)|int}%)"
                {% elif actual_speed >= 0.5 %}
                    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=current_fan_speed VALUE={actual_speed}
                    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=high VALUE={actual_speed}
                    RESPOND TYPE=COMMAND MSG="Bed Fans: slider >=50% detected, applied as new HIGH speed ({(actual_speed * 100)|int}%)"
                {% endif %}
            {% endif %}
        {% endif %}
    {% else %}
        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=previous_readback_value VALUE={bv.readback_value}
        _MONITOR_MESSAGE_READ
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=macro_used VALUE=False

[gcode_macro _FLOATING_FAN]
gcode:
    {% set bv = printer["gcode_macro _BED_FAN_VARS"] %}
    {% set verbose = printer["gcode_macro _USER_VARIABLES"].verbose %}
    {% set chamber_temp = printer["temperature_sensor Chamber"].temperature %}
    {% if bv.readback_value == bv.previous_readback_value %}
        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=previous_readback_value VALUE={bv.readback_value}
        {% set actual_speed = printer["fan_generic Bed_Fans"].speed|float %}
        {% if actual_speed < bv.low|float - 0.01 or actual_speed > bv.mid_point_fan|float + 0.01 %}
            RESPOND TYPE=COMMAND MSG="Bed Fans: floating speed out of range, correcting"
            {% if bv.previous_floating_fan == 0 %}
                SET_FAN_SPEED FAN=Bed_Fans SPEED={bv.low}
            {% elif bv.previous_floating_fan >= bv.low and bv.previous_floating_fan <= bv.mid_point_fan %}
                SET_FAN_SPEED FAN=Bed_Fans SPEED={bv.previous_floating_fan}
            {% else %}
                SET_FAN_SPEED FAN=Bed_Fans SPEED={bv.mid_point_fan}
            {% endif %}
        {% else %}
            {% if chamber_temp <= bv.mid_point_temp|float - 0.1 %}
                {% if chamber_temp < bv.previous_chamber_temp|float %}
                    {% if actual_speed < bv.mid_point_fan %}
                        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=previous_floating_fan VALUE={("%.2f" % actual_speed)}
                        SET_FAN_SPEED FAN=Bed_Fans SPEED={actual_speed + 0.01}
                        {% if verbose %} RESPOND TYPE=COMMAND MSG="Bed Fans: floating - chamber cooling, increasing fan" {% endif %}
                    {% endif %}
                {% endif %}
            {% elif chamber_temp >= bv.mid_point_temp|float + 0.1 %}
                {% if chamber_temp > bv.previous_chamber_temp|float %}
                    {% if actual_speed > bv.low %}
                        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=previous_floating_fan VALUE={("%.2f" % actual_speed)}
                        SET_FAN_SPEED FAN=Bed_Fans SPEED={actual_speed - 0.01}
                        {% if verbose %} RESPOND TYPE=COMMAND MSG="Bed Fans: floating - chamber warming, reducing fan" {% endif %}
                    {% endif %}
                {% endif %}
            {% endif %}
        {% endif %}
    {% else %}
        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=previous_readback_value VALUE={bv.readback_value}
        {% if chamber_temp < bv.mid_point_temp|float %}
            SET_FAN_SPEED FAN=Bed_Fans SPEED={bv.mid_point_fan}
        {% else %}
            SET_FAN_SPEED FAN=Bed_Fans SPEED={bv.low}
        {% endif %}
        BED_FANS_THERMAL_INFO
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=macro_used VALUE=False

[gcode_macro _BED_FAN_SET]
description: Set initial bed fan speed based on current conditions (called at print start)
gcode:
    {% set bv = printer["gcode_macro _BED_FAN_VARS"] %}
    {% if bv.enable %}
        {% if printer["output_pin DISABLE_BED_FANS"].value == 0 %}
            {% set chamber_temp = printer["temperature_sensor Chamber"].temperature %}
            {% if printer.heater_bed.temperature < printer.heater_bed.target|int - 40 %}
                {% if chamber_temp <= bv.chamber_off_temp %}
                    SET_FAN_SPEED FAN=Bed_Fans SPEED={bv.low}
                    RESPOND TYPE=COMMAND MSG="Bed Fans: bed heating, running at low ({(bv.low * 100)|int}%)"
                {% else %}
                    SET_FAN_SPEED FAN=Bed_Fans SPEED=0
                    RESPOND TYPE=COMMAND MSG="Bed Fans: chamber already hot (>{bv.chamber_off_temp}°C), fans off"
                {% endif %}
            {% else %}
                {% if chamber_temp <= bv.chamber_threshold %}
                    SET_FAN_SPEED FAN=Bed_Fans SPEED={bv.high}
                    RESPOND TYPE=COMMAND MSG="Bed Fans: heat soak, high speed ({(bv.high * 100)|int}%)"
                {% elif chamber_temp <= bv.chamber_off_temp %}
                    SET_FAN_SPEED FAN=Bed_Fans SPEED={bv.low}
                    RESPOND TYPE=COMMAND MSG="Bed Fans: chamber above threshold, low speed ({(bv.low * 100)|int}%)"
                {% else %}
                    SET_FAN_SPEED FAN=Bed_Fans SPEED=0
                    RESPOND TYPE=COMMAND MSG="Bed Fans: chamber fully soaked (>{bv.chamber_off_temp}°C), fans off"
                {% endif %}
            {% endif %}
        {% else %}
            RESPOND TYPE=COMMAND MSG="Bed Fans: override active, skipping auto control"
        {% endif %}
    {% endif %}

[delayed_gcode _BED_FAN_MONITOR]
gcode:
    {% set bv = printer["gcode_macro _BED_FAN_VARS"] %}
    {% if bv.enable %}
        {% set chamber_temp = printer["temperature_sensor Chamber"].temperature %}
        {% if printer["output_pin DISABLE_BED_FANS"].value == 0 %}
            {% if printer.print_stats.state == "printing" %}
                {% if chamber_temp < bv.chamber_threshold %}
                    {% if printer.heater_bed.temperature <= printer.heater_bed.target|int - 5 %}
                        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=readback_value VALUE=1
                        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=current_fan_speed VALUE=0
                        _BED_FAN_HELPER
                        _MONITOR_FAN_SET
                        UPDATE_DELAYED_GCODE ID=_BED_FAN_MONITOR DURATION=10
                    {% else %}
                        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=readback_value VALUE=2
                        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=current_fan_speed VALUE={bv.high}
                        _BED_FAN_HELPER
                        _MONITOR_FAN_SET
                        UPDATE_DELAYED_GCODE ID=_BED_FAN_MONITOR DURATION=10
                    {% endif %}
                {% elif chamber_temp >= bv.chamber_threshold %}
                    {% if printer.heater_bed.temperature <= printer.heater_bed.target|int - 5 %}
                        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=readback_value VALUE=1
                        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=current_fan_speed VALUE=0
                        _BED_FAN_HELPER
                        _MONITOR_FAN_SET
                        UPDATE_DELAYED_GCODE ID=_BED_FAN_MONITOR DURATION=10
                    {% elif chamber_temp <= bv.chamber_off_temp %}
                        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=readback_value VALUE=3
                        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=current_fan_speed VALUE={bv.low}
                        {% if bv.floating_monitor %}
                            SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=mid_point_fan VALUE={("%.2f" % (((bv.high - bv.low) * bv.floating_max_speed) + bv.low|float))}
                            SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=mid_point_temp VALUE={(bv.chamber_threshold + bv.chamber_off_temp) / 2.0}
                            SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=previous_chamber_temp VALUE={chamber_temp}
                            _FLOATING_FAN
                        {% else %}
                            _BED_FAN_HELPER
                            _MONITOR_FAN_SET
                        {% endif %}
                        UPDATE_DELAYED_GCODE ID=_BED_FAN_MONITOR DURATION=10
                    {% else %}
                        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=readback_value VALUE=4
                        SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=current_fan_speed VALUE=0
                        _BED_FAN_HELPER
                        _MONITOR_FAN_SET
                        UPDATE_DELAYED_GCODE ID=_BED_FAN_MONITOR DURATION=20
                    {% endif %}
                {% endif %}
            {% elif printer.print_stats.state == "paused" %}
                SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=readback_value VALUE=5
                SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=current_fan_speed VALUE=0
                _BED_FAN_HELPER
                _MONITOR_FAN_SET
                UPDATE_DELAYED_GCODE ID=_BED_FAN_MONITOR DURATION=0
            {% elif printer.print_stats.state in ["complete", "cancelled", "error"] %}
                {% if bv.cool and chamber_temp >= bv.cool_temp %}
                    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=readback_value VALUE=6
                    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=current_fan_speed VALUE={bv.low}
                    _BED_FAN_HELPER
                    _MONITOR_FAN_SET
                    UPDATE_DELAYED_GCODE ID=_BED_FAN_MONITOR DURATION=10
                {% else %}
                    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=readback_value VALUE=7
                    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=current_fan_speed VALUE=0
                    _BED_FAN_HELPER
                    _MONITOR_FAN_SET
                    UPDATE_DELAYED_GCODE ID=_BED_FAN_MONITOR DURATION=0
                {% endif %}
            {% elif printer.print_stats.state == "standby" %}
                SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=readback_value VALUE=7
                SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=current_fan_speed VALUE=0
                _BED_FAN_HELPER
                _MONITOR_FAN_SET
                UPDATE_DELAYED_GCODE ID=_BED_FAN_MONITOR DURATION=0
            {% endif %}
        {% elif printer["output_pin DISABLE_BED_FANS"].value == 1.0 %}
            {% if printer.print_stats.state in ["printing", "paused"] %}
                SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=readback_value VALUE=8
                SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=current_fan_speed VALUE=0
                _BED_FAN_HELPER
                _MONITOR_FAN_SET
                UPDATE_DELAYED_GCODE ID=_BED_FAN_MONITOR DURATION=10
            {% elif printer.print_stats.state in ["complete", "cancelled", "error"] %}
                {% if bv.cool and chamber_temp >= bv.cool_temp %}
                    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=readback_value VALUE=6
                    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=current_fan_speed VALUE={bv.low}
                    _BED_FAN_HELPER
                    _MONITOR_FAN_SET
                    UPDATE_DELAYED_GCODE ID=_BED_FAN_MONITOR DURATION=10
                    SET_PIN PIN=DISABLE_BED_FANS VALUE=0
                {% else %}
                    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=readback_value VALUE=9
                    SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=current_fan_speed VALUE=0
                    _BED_FAN_HELPER
                    _MONITOR_FAN_SET
                    UPDATE_DELAYED_GCODE ID=_BED_FAN_MONITOR DURATION=0
                    SET_PIN PIN=DISABLE_BED_FANS VALUE=0
                {% endif %}
            {% elif printer.print_stats.state == "standby" %}
                SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=readback_value VALUE=9
                SET_GCODE_VARIABLE MACRO=_BED_FAN_VARS VARIABLE=current_fan_speed VALUE=0
                _BED_FAN_HELPER
                _MONITOR_FAN_SET
                UPDATE_DELAYED_GCODE ID=_BED_FAN_MONITOR DURATION=0
                SET_PIN PIN=DISABLE_BED_FANS VALUE=0
            {% endif %}
        {% else %}
            UPDATE_DELAYED_GCODE ID=_BED_FAN_MONITOR DURATION=10
        {% endif %}
    {% else %}
        RESPOND TYPE=error MSG="Bed Fans: disabled (variable_enable is False)"
    {% endif %}

[gcode_macro _START_PRINT_ACTION_BED_FANS_INIT]
description: Klippain startprint_actions hook - sets initial fan speed before bed soak
gcode:
    _BED_FAN_SET

[delayed_gcode _BED_PREHEAT_WATCH]
initial_duration: 10
gcode:
    {% set bv = printer["gcode_macro _BED_FAN_VARS"] %}
    {% if bv.enable and printer.print_stats.state == "standby" %}
        {% if printer.heater_bed.target > 85 %}
            _BED_FAN_SET
        {% elif printer["fan_generic Bed_Fans"].speed > 0 %}
            SET_FAN_SPEED FAN=Bed_Fans SPEED=0
        {% endif %}
    {% endif %}
    UPDATE_DELAYED_GCODE ID=_BED_PREHEAT_WATCH DURATION=30
