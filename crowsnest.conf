#### crowsnest.conf
#### This is the default config after installation.
#### It is also used as the default config in MainsailOS.
#### For details on how to configure this to your needs, see:
#### https://github.com/mainsail-crew/crowsnest/blob/master/README.md


#####################################################################
####                                                            #####
####      Information about ports and according URL's           #####
####                                                            #####
#####################################################################
####                                                            #####
####    Port 8080 equals /webcam/?action=[stream/snapshot]      #####
####    Port 8081 equals /webcam2/?action=[stream/snapshot]     #####
####    Port 8082 equals /webcam3/?action=[stream/snapshot]     #####
####    Port 8083 equals /webcam4/?action=[stream/snapshot]     #####
####                                                            #####
####    Note: These ports are default for most Mainsail         #####
####    installations. Using any other port would involve       #####
####    changing the proxy configuration or using URLs          #####
####    with the specific port like                             #####
####    http://<ip>:<port>/?action=[stream/snapshot]            #####
####                                                            #####
#####################################################################
####    RTSP Stream URL: ( if enabled and supported )           #####
####    rtsp://<ip>:<rtsp_port>/stream.h264                     #####
#####################################################################


[crowsnest]
log_path: /home/ernst/printer_data/logs/crowsnest.log
log_level: verbose                      # Valid Options are quiet/verbose/debug
delete_log: false                       # Deletes log on every restart, if set to true
no_proxy: false                         # If set to true, no reverse proxy is required. Only change this, if you know what you are doing.

# ---------------------------------------------------------------------------
# The C920 is streamed by a standalone go2rtc service, NOT crowsnest — see
# go2rtc.yaml and docs/camera_streaming.md §5. camera-streamer's WebRTC would
# not play in Chromium; go2rtc passes the camera's hardware H.264 through to a
# WebRTC transport with a per-browser fallback chain.
#
# Only ONE process can open /dev/video0. This [cam 1] section is commented out
# so crowsnest releases the camera and go2rtc can grab it. To revert to
# crowsnest, uncomment this block and stop go2rtc (sudo systemctl disable --now go2rtc).
#
# [cam 1]
# mode: camera-streamer                   # camera-streamer - Provides WebRTC, MJPG and snapshots. (RPiOS + RPi 0/1/2/3/4)
#                                         # ustreamer - MJPG/snapshots only, no WebRTC. (All devices)
# port: 8080                              # HTTP/MJPG stream/snapshot port
# device: /dev/v4l/by-id/usb-046d_HD_Pro_Webcam_C920_E98816AF-video-index0   # stable by-id path (index0 = video; index1 = metadata)
# resolution: 1280x720                    # C920 does H264 720p30 and 1080p30; 720p keeps USB/bandwidth light
# max_fps: 30                             # hardware supports 30 in H264/MJPG (raw YUYV would cap at 5-10)
# #custom_flags:                          # You can run the stream services with custom flags.
# v4l2ctl: focus_automatic_continuous=0,focus_absolute=30   # lock focus (fixed scene); tune focus_absolute for a sharp bed
