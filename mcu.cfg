#--------------------------------------#
#### LDO Leviathan MCU definition ######
#--------------------------------------#

[mcu]
##--------------------------------------------------------------------
# This board work by using a serial connection by default. If you
# want to use CAN, invert the commented lines and use canbus_uuid.

serial: /dev/serial/by-id/usb-Klipper_stm32h743xx_4F0038000B51323237363839-if00
# canbus_uuid: change-me-to-the-correct-canbus-id
##--------------------------------------------------------------------

[include config/mcu_definitions/main/LDO_Leviathan_v1.2.cfg] # Do not remove this line - works for both V1.2 and V1.3 boards
[board_pins leviathan_mcu]
mcu: mcu
aliases:
    X_STEP=MCU_HV-STEPPER0_STEP , X_DIR=MCU_HV-STEPPER0_DIR , X_ENABLE=MCU_HV-STEPPER0_EN   , X_TMCUART=MCU_HV-STEPPER0_CS  ,
    Y_STEP=MCU_HV-STEPPER1_STEP , Y_DIR=MCU_HV-STEPPER1_DIR , Y_ENABLE=MCU_HV-STEPPER1_EN   , Y_TMCUART=MCU_HV-STEPPER1_CS  ,

    DRIVER_SPI_MOSI=MCU_SPI2_MOSI , # Used for TMC5160 (HV-STEPPER0 and HV-STEPPER1)
    DRIVER_SPI_MISO=MCU_SPI2_MISO , # Used for TMC5160 (HV-STEPPER0 and HV-STEPPER1)
    DRIVER_SPI_SCK=MCU_SPI2_SCK   , # Used for TMC5160 (HV-STEPPER0 and HV-STEPPER1)

    Z_STEP=MCU_STEPPER0_STEP    , Z_DIR=MCU_STEPPER0_DIR    , Z_ENABLE=MCU_STEPPER0_EN      , Z_TMCUART=MCU_STEPPER0_UART   ,
    Z1_STEP=MCU_STEPPER1_STEP   , Z1_DIR=MCU_STEPPER1_DIR   , Z1_ENABLE=MCU_STEPPER1_EN     , Z1_TMCUART=MCU_STEPPER1_UART  ,
    Z2_STEP=MCU_STEPPER2_STEP   , Z2_DIR=MCU_STEPPER2_DIR   , Z2_ENABLE=MCU_STEPPER2_EN     , Z2_TMCUART=MCU_STEPPER2_UART  ,
    Z3_STEP=MCU_STEPPER3_STEP   , Z3_DIR=MCU_STEPPER3_DIR   , Z3_ENABLE=MCU_STEPPER3_EN     , Z3_TMCUART=MCU_STEPPER3_UART  ,

    E_STEP=MCU_STEPPER4_STEP    , E_DIR=MCU_STEPPER4_DIR    , E_ENABLE=MCU_STEPPER4_EN      , E_TMCUART=MCU_STEPPER4_UART   ,

    X_STOP=MCU_STOP_X           , Y_STOP=MCU_STOP_Y         , Z_STOP=MCU_STOP_Z,
    PROBE_INPUT=MCU_Z_PROBE,
    RUNOUT_SENSOR=MCU_STOP_E0,

    E_HEATER=MCU_HE0            , E_TEMPERATURE=MCU_T1      ,
    BED_HEATER=MCU_BED0         , BED_TEMPERATURE=MCU_T0    ,

    PART_FAN=MCU_FAN0           , E_FAN=MCU_FAN1            ,
    CONTROLLER_FAN=MCU_FAN2     ,
    FILTER_FAN=MCU_FAN3         ,

    CHAMBER_TEMPERATURE=MCU_T2  , ELECTRICAL_CABINET_TEMPERATURE=MCU_T3,

    LIGHT_OUTPUT=MCU_LED        ,
    STATUS_NEOPIXEL=MCU_NEOPIXEL,

[heater_bed]
pullup_resistor: 2200

[extruder]
pullup_resistor: 2200

#-------------------------------------------------------#
#### LDO Nighthawk SB toolhead v2 MCU definition ########
#-------------------------------------------------------#

[mcu toolhead]
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_450054000550303857383820-if00 ##### <---  change-me-to-the-correct-serial  hint: ls /dev/serial/by-id/*   #
##--------------------------------------------------------------------

# If you want to override the wiring of the LDO Nighthawk SB V2, keep in mind that this
# board is defined using the "toolhead" name. So you should use "pin: toolhead:PIN_NAME"
# in your own overrides.cfg files.

[include config/mcu_definitions/toolhead/LDO_Nitehawk-SB_v2.0.cfg] # Do not remove this line
[board_pins nitehawk_mcu]
mcu: toolhead
aliases:
    E_STEP=MCU_EMOT_STEP , E_DIR=MCU_EMOT_DIR , E_ENABLE=MCU_EMOT_EN , E_TMCUART=MCU_EMOT_UART ,

    X_STOP=MCU_ENDSTOP_X , Y_STOP=MCU_ENDSTOP_Y ,
    PROBE_INPUT=MCU_HV_ENDSTOP ,

    E_HEATER=MCU_HEAT , E_TEMPERATURE=MCU_TEMP , CHAMBER_TEMPERATURE=MCU_HEAT_CHAMBER ,

    PART_FAN=MCU_FAN1       , E_FAN=MCU_FAN0 ,
    PART_FAN_TACHO=MCU_PWM1 , E_FAN_TACHO=MCU_PWM0 ,

    STATUS_NEOPIXEL=MCU_RGB , STATUS_BOARD=MCU_ACTIVITY_LED ,

    ADXL_CS=MCU_ADXL_CS , ADXL_SCLK=MCU_ADXL_SCK , ADXL_MOSI=MCU_ADXL_MOSI , ADXL_MISO=MCU_ADXL_MISO ,

    TX_PIN=MCU_EMOT_TX ,


#----------------------------------------#
#  LDO Nighthawk-SB v2 pins remapping    #
#----------------------------------------#

# These pins overrides are automatically added when you select the LDO
# toolhead MCU during the installation process. They should provide a
# good base to work with. Feel free to adapt to your board if needed!

[extruder]
step_pin: toolhead:E_STEP
dir_pin: toolhead:E_DIR
enable_pin: !toolhead:E_ENABLE
heater_pin: toolhead:E_HEATER
sensor_pin: toolhead:E_TEMPERATURE
pullup_resistor: 2200

[tmc2209 extruder]
uart_pin: toolhead:E_TMCUART
tx_pin: toolhead:TX_PIN
sense_resistor: 0.100

# [probe]
# pin: ^toolhead:PROBE_INPUT

[fan]
pin: toolhead:PART_FAN
#tachometer_pin: toolhead:PART_FAN_TACHO

[heater_fan hotend_fan]
pin: toolhead:E_FAN
tachometer_pin: toolhead:E_FAN_TACHO

## Uncomment the following line if not using sensorless homing
## and having the X endstop plugged to the toolhead MCU
# [stepper_x]
# endstop_pin: ^toolhead:X_STOP
# [stepper_y]
# endstop_pin: ^toolhead:Y_STOP

[neopixel status_leds]
pin: toolhead:STATUS_NEOPIXEL



#---------------------------------------------#
#### Fysetc ERCF ERB MCU definition ###########
#---------------------------------------------#

[mcu mmu]
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_rp2040_E6612C771F48752B-if00
# canbus_uuid: change-me-to-the-correct-canbus-id
##--------------------------------------------------------------------

# If you want to override the wiring of the Fysetc ERCF ERB board, keep in mind that this
# board is defined using the "mmu" name. So you should use "pin: mmu:PIN_NAME"
# in your own overrides.cfg files.

[include config/mcu_definitions/mmu/Fysetc_ERCF_ERB.cfg] # Do not remove this line
[board_pins mmu_mcu]
mcu: mmu
aliases:
    MMU_GEAR_STEP=MCU_GEAR_MOTOR_STEP    , MMU_GEAR_DIR=MCU_GEAR_MOTOR_DIR    , MMU_GEAR_ENABLE=MCU_GEAR_MOTOR_EN    , MMU_GEAR_UART=MCU_GEAR_MOTOR_UART    ,
    MMU_GEAR_DIAG=MCU_GEAR_MOTOR_DIAG    ,
    MMU_SEL_STEP=MCU_SELECTOR_MOTOR_STEP , MMU_SEL_DIR=MCU_SELECTOR_MOTOR_DIR , MMU_SEL_ENABLE=MCU_SELECTOR_MOTOR_EN , MMU_SEL_UART=MCU_SELECTOR_MOTOR_UART ,
    MMU_SEL_DIAG=MCU_SELECTOR_MOTOR_DIAG ,

    MMU_SEL_ENDSTOP=MCU_ENDSTOP     ,
    MMU_SERVO=MCU_SERVO             ,
    MMU_ENCODER=MCU_ENCODER         ,
    MMU_GATE_SENSOR=MCU_HALL_SENSOR ,
    MMU_NEOPIXEL=MCU_RGB            ,

    MMU_PRE_GATE_0=MCU_0   , MMU_PRE_GATE_1=MCU_1   ,
    MMU_PRE_GATE_2=MCU_2   , MMU_PRE_GATE_3=MCU_3   ,
    MMU_PRE_GATE_4=MCU_4   , MMU_PRE_GATE_5=MCU_5   ,
    MMU_PRE_GATE_6=MCU_6   , MMU_PRE_GATE_7=MCU_7   ,
    MMU_PRE_GATE_8=MCU_26  , MMU_PRE_GATE_9=MCU_27  ,
    MMU_PRE_GATE_10=MCU_28 , MMU_PRE_GATE_11=MCU_29 ,
