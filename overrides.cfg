# This file is yours! Feel free to edit it in order to include all the needed
# things to adapt my generic config to your machine. This file will not be erased
# when updating the config using moonraker and it will be kept as you've set it.
# You can change every section of the config. You can also add some new custom macros, etc...
# The corresponding documentation can be found in: docs > overrides.md

### Also, keep in mind: if you use a multi-MCU config such as the old school double SKRs or a CANbus toolhead
### board, you will need to specify which components are connected to which board in your own mcu.cfg file!
### Example: if something is connected to the toolhead MCU, you should use "config_pin: toolhead:PIN_NAME".

#> Main control MCUs are called "mcu" (and "secondary" when using a double MCU configuration)
#> Toolhead CANboard MCUs are called "toolhead"
#> MMU/ERCF MCUs are called "mmu" 

# ------------------------------------------------------------------------------------------

[include autotune_tmc.cfg]

[shaketune]

#-------------------------#
#   START_PRINT SEQUENCE  #
#-------------------------#

## The START_PRINT sequence is modular and fully customizable. A default sequence is auto-populated based on
## your probe choice (TAP, Dockable, Inductive). If you still want to change it, uncomment the next 3 lines
## to define `variable_startprint_actions`. You can use any number of actions, and you can duplicate actions if needed.
## Available actions: "bed_soak", "extruder_preheating", "chamber_soak", "extruder_heating", "tilt_calib",
##                    "z_offset", "contact_z_home", "contact_auto_calibrate", "beacon_calib", "bedmesh",
##                    "purge", "clean", "primeline"
## You can add custom actions with a matching `_START_PRINT_ACTION_<NAME>` macro. Example:
##   variable_startprint_actions: "bed_soak", "my_start_action", "bedmesh", "primeline"
## Cartographer Touch should run contact_z_home after tilt_calib and before bedmesh:
##   variable_startprint_actions: "bed_soak", "extruder_preheating", "chamber_soak", "tilt_calib", "contact_z_home", "bedmesh", "primeline"
##   [gcode_macro _START_PRINT_ACTION_MY_START_ACTION]
##   gcode:
##     ## Your custom START_PRINT G-code here
## Legacy START_PRINT slots `custom1` through `custom9` are also supported and call
## `_MODULE_CUSTOM1` through `_MODULE_CUSTOM9`.
##
# [gcode_macro _USER_VARIABLES]
# variable_startprint_actions: "action1", "action2", ...
# gcode: # do not remove this line

## The END_PRINT sequence is modular and fully customizable. A default sequence is auto-populated, but if you
## still want to change it, uncomment the next 3 lines to define `variable_endprint_actions`.
## You can use any number of actions, and you can duplicate actions if needed.
## Available actions: "retract_filament", "turn_off_heaters", "turn_off_fans", "turn_off_motors",
##                    "reset_limits"
## You can add custom actions with a matching `_END_PRINT_ACTION_<NAME>` macro. Example:
##   variable_endprint_actions: "retract_filament", "my_end_action", "turn_off_heaters"
##   [gcode_macro _END_PRINT_ACTION_MY_END_ACTION]
##   gcode:
##     ## Your custom END_PRINT G-code here
##
# [gcode_macro _USER_VARIABLES]
# variable_endprint_actions: "action1", "action2", ...
# gcode: # do not remove this line

#-------------------------#
#   EXTRUDER/BED PIDs     #
#-------------------------#

## Here is an example of some overrides for the PIDs. I put them here as almost everyone will use them,
## so just uncomment the following lines and change the values according to your own machine
[extruder]
control: pid
pid_kp: 36.196
pid_ki: 10.492
pid_kd: 31.219

[heater_bed]
control: pid
pid_kp: 54.268
pid_ki: 1.391
pid_kd: 529.111


#-------------------------#
#   Z MOTORS DIRECTION    #
#-------------------------#

## Here is an example of some overrides for the motor directions as it's a pretty common one. If you need
## to invert the Z1 or Z3 motor direction on your machine, just uncomment the following lines.
# [stepper_z1]
# dir_pin: !Z1_DIR

# [stepper_z3]
# dir_pin: !Z3_DIR


#-------------------------#
#   Probe Offsets         #
#-------------------------#

## Here is an example of some overrides for bed probes. These frequently have calibrated offsets for xyz,
## and many will need them during setup. If you need to set these, just uncomment the following lines.
# [probe]
# x_offset: -1.85
# y_offset: 29.3
# z_offset: 12.6

#-------------------------#
#   Part Fan Overrides    #
#-------------------------#

## The following are changes required for the unique wiring of the honeybadger 3 wire part fan, where 
## the 3rd wire is a PWM signal and not a tachometer signal.
[fan]
pin: !toolhead:PART_FAN
cycle_time: 0.00004
hardware_pwm: False
kick_start_time: 0.5
off_below: 0.14

#-------------------------#
#   Caselight Overrides   #
#-------------------------#

[output_pin caselight]
cycle_time: 0.00025 ## Setting to high frequency PWM to avoid flickering on the caselight
value: 100
shutdown_value: 0

[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_670FCCD84E5737374D202020FF061406-if00
x_offset: 0
y_offset: 18
mesh_main_direction: x
mesh_runs: 2
home_xy_position: 175, 175
# contact_max_hotend_temperature: 275

[extruder]
sensor_type: PT1000
rotation_distance: 22.905740611
max_temp: 350
pressure_advance: 0.035
min_extrude_temp: 170

[heater_bed]
sensor_type: ATC Semitec 104NT-4-R025H42G
max_power: 0.8
sensor_pin: PA2

[stepper_x]
dir_pin: !X_DIR

[stepper_y]
dir_pin: !Y_DIR

[stepper_z]
dir_pin: !Z_DIR

[stepper_z2]
dir_pin: !Z2_DIR

[controller_fan controller_fan]
fan_speed: 0.6

[stepper_x]
position_max: 351
position_endstop: 351
# X endstop relocated to the Nitehawk HV probe port (PC15), wired NC. NOTE: position_endstop
# above still reflects the OLD switch — it must be recalibrated for the new location before
# trusting a homed X. Polarity (^ / !) TBD via QUERY_ENDSTOPS.
endstop_pin: ^toolhead:PROBE_INPUT

[stepper_y]
position_max: 359
position_endstop: 359

# ------- BTT SFS v2 (Smart Filament Sensor) -------
# Both halves are PASSIVE (pause_on_runout: False, no runout_gcode) so they never affect
# printing — we only want their live state visible via QUERY_FILAMENT_SENSOR. Polarity is
# provisional; set after observing readings.
#
# Runout half is observation-only on purpose (redundant with the HH 'extruder' sensor).
# The motion half is the useful one and will later be gated by HH via _MMU_ACTION_CHANGED.
# DISABLED 2026-07-13 — BTT SFS v2 physically removed (its wheel drag was corrupting the
# sync-feedback signal). Both halves are gone: runout (PC0, below) and motion/encoder (PC1,
# the [mmu_encoder] in mmu_hardware.cfg). PC0 + PC1 are now free. Runout/load verification is
# covered by the HH pre-gate / gate / post-gear / extruder / toolhead sensors. Re-enable if the
# SFS is reinstalled (ideally upstream of the sync-feedback sensor).
#[filament_switch_sensor sfs_runout]
#switch_pin: ^RUNOUT_SENSOR        # PC0
#pause_on_runout: False
#runout_gcode:
#insert_gcode:

# ------- Bed Fans -------
# Bed fan control is a self-contained, always-on state machine (see docs/bed_fans_control.md
# and bed_fans.cfg). It runs its own _BED_FAN_TICK loop and needs no START_PRINT hooks, so the
# old "bed_fans_init" / "bed_fans_monitor" actions have been removed from the sequence below.
[include bed_fans.cfg]

# ------- Nozzle thermal expansion compensation -------
# Beacon-contact nozzle growth compensation (see thermal_expansion.cfg and
# docs/thermal_expansion.md). Wired into START_PRINT/END_PRINT via the
# "nozzle_expansion" action registered in _USER_VARIABLES below.
[include thermal_expansion.cfg]

[gcode_shell_command git_push]
command: ~/printer_data/config/git_sync.sh push
timeout: 60.0
verbose: True

[gcode_shell_command git_pull]
command: ~/printer_data/config/git_sync.sh pull
timeout: 60.0
verbose: True

[gcode_macro GIT_PUSH]
description: Commits and pushes current config to GitHub
gcode:
    RUN_SHELL_COMMAND CMD=git_push

[gcode_macro GIT_PULL]
description: Pulls config from GitHub (the script restarts firmware only if it changed)
gcode:
    {% if printer.print_stats.state in ["printing", "paused"] %}
        RESPOND TYPE=error MSG="GIT_PULL blocked while a print is active"
    {% else %}
        RUN_SHELL_COMMAND CMD=git_pull
    {% endif %}

[gcode_macro _USER_VARIABLES]
variable_startprint_actions: "bed_soak", "extruder_preheating", "chamber_soak", "clean", "contact_auto_calibrate", "tilt_calib", "bedmesh", "contact_z_home", "extruder_heating", "nozzle_expansion", "purge", "clean", "primeline"
variable_endprint_actions: "retract_filament", "nozzle_expansion", "turn_off_heaters", "turn_off_fans", "turn_off_motors", "reset_limits"
gcode:


[resonance_tester]
probe_points: 175, 175, 20

[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 55.0
shaper_type_y: mzv
shaper_freq_y: 37.2
damping_ratio_x: 0.055
damping_ratio_y: 0.071

[include macros/calibration/test_speed.cfg]

[tmc5160 stepper_x]
run_current: 1.0

[tmc5160 stepper_y]
run_current: 1.0


[printer]
max_velocity: 500
max_accel: 21000 ## 0.85*31000 from TEST_SPEED macro

# |SPEED | ACCEL |
# |  450 | 31000 |
# |  500 | 25000 |
# |  550 | 20000 |
# |  600 | 15000 |


[auto_speed]
#axis: diag_x, diag_y  ; One or multiple of `x`, `y`, `diag_x`, `diag_y`, `z`

#margin: 20            ; How far away from your axes to perform movements

#settling_home: 1      ; Perform settling home before starting Auto Speed
#max_missed: 1.0       ; Maximum full steps that can be missed
#endstop_samples: 3    ; How many endstop samples to take for endstop variance

#accel_min: 1000.0     ; Minimum acceleration test may try
#accel_max: 50000.0    ; Maximum acceleration test may try
#accel_accu: 0.05      ; Keep binary searching until the result is within this percentage

#velocity_min: 50.0    ; Minimum velocity test may try
#velocity_max: 5000.0  ; Maximum velocity test may try
#velocity_accu: 0.05   ; Keep binary searching until the result is within this percentage

#derate: 0.8           ; Derate discovered results by this amount

#validate_margin: Unset      ; Margin for VALIDATE, Defaults to margin
#validate_inner_margin: 20.0 ; Margin for VALIDATE inner pattern
#validate_iterations: 50     ; Perform VALIDATE pattern this many times

#results_dir: ~/printer_data/config ; Destination directory for graphs